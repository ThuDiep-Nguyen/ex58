<div class="container py-4">
  <button class="btn btn-outline-dark mb-4" (click)="goBack()">← Quay lại</button>

  <div class="card shadow border-0 rounded-4 overflow-hidden">
    <div class="row g-0">
      <div class="col-md-5">
        <img [src]="fashion.thumbnail" [alt]="fashion.title"
          style="width:100%; height:100%; object-fit:cover; min-height:360px;" />
      </div>
      <div class="col-md-7 p-4">
        <div class="d-flex justify-content-between align-items-start mb-2">
          <span class="badge bg-dark fs-6">{{ fashion.style }}</span>
        </div>
        
        <h2 class="fw-bold mb-3">{{ fashion.title }}</h2>

        <div class="p-3 bg-light rounded mb-4">
          <p class="mb-0 text-muted"><i class="bi bi-truck"></i> Miễn phí vận chuyển cho đơn hàng trên 500k</p>
          <p class="mb-0 text-muted"><i class="bi bi-arrow-repeat"></i> Đổi trả trong vòng 7 ngày</p>
        </div>

        <p class="text-muted small mb-4">📅 Ngày đăng: {{ fashion.createdAt | date:'dd/MM/yyyy' }}</p>
        
        <hr />
        
        <h5 class="fw-bold mt-4 mb-3">Thông tin chi tiết</h5>
        <div [innerHTML]="safeDetails" class="detail-content text-justify"></div>
        
        <div class="mt-5">
          <button class="btn btn-dark btn-lg w-100">
            <i class="bi bi-cart-plus"></i> Thêm vào giỏ hàng
          </button>
        </div>
      </div>
    </div>
  </div>
</div>

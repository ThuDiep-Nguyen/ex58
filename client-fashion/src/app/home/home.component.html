<!-- Search bar -->
<div class="search-bar py-3 mb-2 bg-white shadow-sm">
  <div class="container">
    <div class="row g-2 align-items-center">
      <div class="col-md-8">
        <input
          type="text"
          class="form-control"
          [(ngModel)]="searchStyle"
          placeholder="🔍 Nhập Style để tìm kiếm..."
        />
      </div>
      <div class="col-md-3">
        <select class="form-select" [(ngModel)]="searchStyle">
          <option value="">-- Tất cả Style --</option>
          <option *ngFor="let s of styles" [value]="s">{{ s }}</option>
        </select>
      </div>
      <div class="col-md-1">
        <button class="btn btn-dark w-100" (click)="clearSearch()">✕</button>
      </div>
    </div>
  </div>
</div>

<div class="container pb-5">

  <!-- Khi đang search -->
  <ng-container *ngIf="searchStyle; else groupedView">
    <div class="style-group-title">Kết quả: "{{ searchStyle }}"</div>
    <div class="row g-3">
      <div class="col-6 col-md-3" *ngFor="let f of filteredFashions">
          <div class="fashion-card h-100 border-0 shadow-sm rounded overflow-hidden" (click)="goDetail(f._id!)" style="cursor: pointer; transition: transform 0.2s;">
            <div class="position-relative">
              <img [src]="f.thumbnail" [alt]="f.title" class="w-100" style="height: 250px; object-fit: cover;" 
                onerror="this.src='https://placehold.co/400x300?text=No+Image'"/>
              <span class="position-absolute top-0 end-0 badge bg-dark m-2">{{ f.style }}</span>
            </div>
            <div class="card-body p-3">
              <h6 class="card-title fw-bold text-truncate" [title]="f.title">{{ f.title }}</h6>
              <div class="d-flex justify-content-between align-items-center mt-2">
                <small class="text-muted" style="font-size: 0.8rem;">Xem chi tiết →</small>
              </div>
            </div>
          </div>
      </div>
      <div class="col-12 text-muted" *ngIf="filteredFashions.length === 0">
        Không tìm thấy Fashion nào với style "{{ searchStyle }}"
      </div>
    </div>
  </ng-container>

  <!-- Khi không search: nhóm theo Style -->
  <ng-template #groupedView>
    <ng-container *ngFor="let style of styles">
      <div class="style-group-title">{{ style }}</div>
      <div class="row g-3 mb-4">
        <div class="col-6 col-md-3" *ngFor="let f of getFashionsByStyle(style)">
          <div class="fashion-card h-100 border-0 shadow-sm rounded overflow-hidden" (click)="goDetail(f._id!)" style="cursor: pointer; transition: transform 0.2s;">
            <div class="position-relative">
              <img [src]="f.thumbnail" [alt]="f.title" class="w-100" style="height: 250px; object-fit: cover;" 
                onerror="this.src='https://placehold.co/400x300?text=No+Image'"/>
              <span class="position-absolute top-0 end-0 badge bg-dark m-2">{{ f.style }}</span>
            </div>
            <div class="card-body p-3">
              <h6 class="card-title fw-bold text-truncate" [title]="f.title">{{ f.title }}</h6>
              <div class="d-flex justify-content-between align-items-center mt-2">
                <small class="text-muted" style="font-size: 0.8rem;">Xem chi tiết →</small>
              </div>
            </div>
          </div>
        </div>
      </div>
    </ng-container>
  </ng-template>

</div>

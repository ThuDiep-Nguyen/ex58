<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Client Fashion</title>
  <base href="/">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"/>
  <style>
    body { background: #f5f5f5; font-family: 'Segoe UI', sans-serif; }

    .style-group-title {
      font-size: 1.1rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 3px;
      border-bottom: 2px solid #222;
      padding-bottom: 8px;
      margin: 32px 0 16px;
    }

    .fashion-card {
      cursor: pointer;
      border: none;
      border-radius: 10px;
      overflow: hidden;
      box-shadow: 0 2px 8px rgba(0,0,0,0.1);
      transition: transform 0.2s, box-shadow 0.2s;
      background: #fff;
    }
    .fashion-card:hover {
      transform: translateY(-4px);
      box-shadow: 0 8px 20px rgba(0,0,0,0.15);
    }
    .fashion-card img {
      width: 100%;
      height: 200px;
      object-fit: cover;
    }
    .fashion-card .card-body { padding: 12px; }
    .fashion-card .card-title { font-size: 0.9rem; font-weight: 600; margin: 0 0 6px; }
  </style>
</head>
<body>
  <app-root></app-root>
</body>
</html>

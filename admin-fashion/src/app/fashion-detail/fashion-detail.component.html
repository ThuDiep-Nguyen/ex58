<div class="card shadow border-0 rounded-4 overflow-hidden">
  <div class="card-header bg-dark text-white d-flex justify-content-between align-items-center">
    <h5 class="mb-0">Chi tiết Fashion</h5>
    <button class="btn btn-sm btn-light" (click)="goBack()">← Quay lại</button>
  </div>
  <div class="card-body">
    <div class="row">
      <div class="col-md-4">
        <img [src]="fashion.thumbnail" class="img-fluid rounded shadow"
          style="width:100%; object-fit:cover; max-height:280px;" />
      </div>
      <div class="col-md-8">
        <div class="d-flex justify-content-between align-items-start">
          <h2 class="text-primary fw-bold">{{ fashion.title }}</h2>
          <span class="badge bg-dark fs-6">{{ fashion.style }}</span>
        </div>
        
        <p class="text-muted small">
          <i class="bi bi-clock"></i> Ngày tạo: {{ fashion.createdAt | date:'dd/MM/yyyy HH:mm' }}
        </p>
        
        <hr/>
        <div class="detail-content">
          <h5 class="fw-bold mb-3">Mô tả chi tiết:</h5>
          <div [innerHTML]="safeDetails"></div>
        </div>
      </div>
    </div>
  </div>
</div>
